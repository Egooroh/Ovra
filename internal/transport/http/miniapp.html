<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ovra — Настройка доски</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        var(--tg-theme-bg-color, #ffffff);
      --bg2:       var(--tg-theme-secondary-bg-color, #f1f1f1);
      --text:      var(--tg-theme-text-color, #000000);
      --hint:      var(--tg-theme-hint-color, #999999);
      --link:      var(--tg-theme-link-color, #2678b6);
      --btn:       var(--tg-theme-button-color, #2678b6);
      --btn-text:  var(--tg-theme-button-text-color, #ffffff);
      --radius:    12px;
      --shadow:    0 2px 8px rgba(0,0,0,.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .header-logo {
      width: 36px; height: 36px;
      background: #3450CD;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo svg { width: 24px; height: auto; display: block; }
    .header-title { font-weight: 700; font-size: 17px; }
    .header-sub   { font-size: 12px; color: var(--hint); margin-top: 1px; }

    /* ── Profile card ── */
    .profile-card {
      margin: 16px 16px 0;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--btn);
      color: var(--btn-text);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .profile-name  { font-weight: 600; font-size: 16px; }
    .profile-user  { font-size: 13px; color: var(--hint); margin-top: 2px; }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      margin-top: 4px;
    }
    .badge.ok    { background: #d1fae5; color: #065f46; }
    .badge.warn  { background: #fef3c7; color: #92400e; }
    .badge.err   { background: #fee2e2; color: #991b1b; }

    /* ── Status indicator (corporate: colored dot + label, no emoji) ── */
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status.ok   { color: #22c55e; } .status.ok   .dot { background: #22c55e; }
    .status.warn { color: #f59e0b; } .status.warn .dot { background: #f59e0b; }
    .status.err  { color: #ef4444; } .status.err  .dot { background: #ef4444; }

    /* ── Role tag ── */
    .role { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 9px; border-radius: 6px; }
    .role.admin     { background: rgba(99,102,241,.14); color: var(--btn); }
    .role.moderator { background: rgba(245,158,11,.14); color: #b45309; }
    .role.member    { background: rgba(128,128,128,.16); color: var(--hint); }

    /* ── Role select (role management section) ── */
    .role-select {
      background: var(--bg2); border: 1.5px solid rgba(0,0,0,.1);
      border-radius: 8px; padding: 5px 8px;
      font-size: 13px; color: var(--text); outline: none;
      -webkit-appearance: none; appearance: none;
      cursor: pointer; min-width: 115px; text-align: right;
    }
    .role-select:focus { border-color: var(--btn); }

    /* ── Board (workspace) avatar in the list ── */
    .board-icon {
      width: 40px; height: 40px;
      border-radius: 9px;
      background: rgba(99,102,241,.12);
      color: var(--btn);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      flex-shrink: 0;
    }

    /* ── Back link (board view → home) ── */
    .back-row {
      display: inline-flex; align-items: center; gap: 4px;
      margin: 14px 16px 2px;
      color: var(--link);
      font-size: 14px; font-weight: 500;
      cursor: pointer; user-select: none;
    }
    .back-row:active { opacity: .6; }

    /* ── Section ── */
    .section {
      margin: 16px 16px 0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--hint);
      margin-bottom: 8px;
      padding: 0 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 12px;
      border-radius: calc(var(--radius) - 2px);
      border: none;
      background: transparent;
      color: var(--hint);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tab-btn.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    /* ── Form ── */
    .form-block {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 10px;
    }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--hint);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid rgba(0,0,0,.1);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--btn); }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      margin-top: 14px;
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-primary:not(:disabled):active { opacity: .8; }

    /* ── Info row ── */
    .info-row {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .info-label { font-size: 13px; color: var(--hint); }
    .info-value { font-size: 14px; font-weight: 600; }

    /* ── Project list ── */
    .project-list { margin-top: 10px; }
    .project-item {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .project-item:active { background: var(--bg); border-color: var(--btn); }
    .project-icon {
      width: 36px; height: 36px;
      background: var(--btn);
      opacity: .15;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .project-name { font-weight: 600; font-size: 15px; }

    /* ── Success ── */
    .success-block {
      text-align: center;
      padding: 32px 16px;
    }
    .success-icon {
      font-size: 52px;
      margin-bottom: 12px;
    }
    .success-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-sub   { font-size: 14px; color: var(--hint); line-height: 1.5; }

    /* ── Error / loading ── */
    .msg {
      margin: 24px 16px 0;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--hint);
      font-size: 14px;
      text-align: center;
    }
    .msg.err { color: #ef4444; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(0,0,0,.1);
      border-top-color: var(--btn);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 24px auto;
    }

    /* ── Toggle switch (digest on/off) ── */
    .toggle { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .track {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.18); border-radius: 24px; transition: .2s;
    }
    .track::before {
      position: absolute; content: "";
      height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: .2s;
    }
    input:checked + .track { background: var(--btn); }
    input:checked + .track::before { transform: translateX(18px); }

    /* ── Time input ── */
    .time-input {
      background: var(--bg); border: 1.5px solid rgba(0,0,0,.1);
      border-radius: 8px; padding: 5px 10px;
      font-size: 14px; color: var(--text); outline: none;
    }
    .time-input:focus { border-color: var(--btn); }

    /* ── Secondary button ── */
    .btn-secondary {
      width: 100%; padding: 11px; margin-top: 8px;
      background: transparent; color: var(--btn);
      border: 1.5px solid var(--btn); border-radius: var(--radius);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-secondary:active { opacity: .7; }

    /* ── Refresh icon button ── */
    .btn-refresh {
      background: none; border: none; color: var(--hint); cursor: pointer;
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
    }
    .btn-refresh:active { opacity: .6; }

    /* ── Member card (tasks by participant) ── */
    .member-card { background: var(--bg2); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .member-header {
      padding: 12px 14px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
    }
    .member-header:active { opacity: .75; }
    .member-name { font-weight: 600; font-size: 14px; }
    .member-tasks { padding: 0 14px 10px; }
    .member-tasks.collapsed { display: none; }
    .chevron { transition: transform .2s; flex-shrink: 0; }

    /* ── Task item inside member card ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .task-item:last-child { border-bottom: none; padding-bottom: 0; }
    .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .task-title { font-size: 14px; font-weight: 500; line-height: 1.3; }
    .task-meta { font-size: 11px; color: var(--hint); margin-top: 2px; }
    .task-overdue { color: #ef4444; }

    /* hide/show helpers */
    .hidden { display: none !important; }

    /* ── Edit-task bottom sheet ── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
    .edit-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-radius: 16px 16px 0 0;
      padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 16px);
      z-index: 101; transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 92vh; overflow-y: auto;
    }
    .edit-sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: rgba(0,0,0,.18); border-radius: 2px; margin: 10px auto 0; }
    .sheet-header {
      padding: 14px 20px 10px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,.07);
    }
    .sheet-title { font-weight: 700; font-size: 16px; }
    .sheet-close {
      background: var(--bg2); border: none; color: var(--hint);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; line-height: 1;
    }
    .sheet-close:active { opacity: .6; }
    .sheet-body { padding: 14px 20px; }
    .sheet-field { margin-bottom: 14px; }
    .sheet-field label {
      display: block; font-size: 11px; font-weight: 700; color: var(--hint);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px;
    }
    .sheet-field input, .sheet-field textarea, .sheet-field select {
      width: 100%; background: var(--bg2); border: none; border-radius: 10px;
      padding: 10px 12px; font-size: 15px; color: var(--text); outline: none;
      -webkit-appearance: none; appearance: none; font-family: inherit;
    }
    .sheet-field textarea { resize: none; min-height: 68px; }
    .sheet-field input:focus, .sheet-field textarea:focus, .sheet-field select:focus {
      box-shadow: 0 0 0 2px var(--btn);
    }
    .sheet-save {
      width: 100%; padding: 13px; background: var(--btn); color: var(--btn-text);
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px; transition: opacity .15s;
    }
    .sheet-save:active { opacity: .8; }
    .sheet-save:disabled { opacity: .45; pointer-events: none; }

    /* tappable task rows */
    .task-item { cursor: pointer; border-radius: 8px; transition: background .12s; padding-right: 4px; }
    .task-item:active { background: rgba(0,0,0,.04); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 106 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Ovra" role="img">
      <path d="M4.90625 28.2344C6.28574 30.9469 7.76304 33.5393 9.33105 35.999C7.76319 38.4585 6.28562 41.0505 4.90625 43.7627C4.40817 43.0546 3.91702 42.338 3.43652 41.6113C2.24142 39.8038 1.0962 37.931 0 35.999C1.0962 34.067 2.24142 32.1942 3.43652 30.3867C3.91717 29.6598 4.40801 28.9426 4.90625 28.2344Z" fill="white"/>
      <path d="M100.873 28.2344C101.371 28.9427 101.862 29.6597 102.343 30.3867C103.538 32.1943 104.684 34.0669 105.78 35.999C104.684 37.9311 103.538 39.8038 102.343 41.6113C101.862 42.3381 101.371 43.0546 100.873 43.7627C99.4936 41.0503 98.0153 38.4587 96.4473 35.999C98.0154 33.5391 99.4935 30.947 100.873 28.2344Z" fill="white"/>
      <path d="M52.8828 0C72.3086 0 89.0412 11.4253 100.866 28.2344C99.4865 30.9473 98.0087 33.5399 96.4404 36C85.4363 18.7382 69.9892 8 52.8828 8C35.7763 8 20.3284 18.738 9.32422 36C7.75596 33.5399 6.2781 30.9473 4.89844 28.2344C16.7234 11.4251 33.4569 0 52.8828 0Z" fill="white"/>
      <path d="M96.4404 36C98.0086 38.4599 99.4866 41.052 100.866 43.7646C89.0412 60.5741 72.3088 72 52.8828 72C33.4566 72 16.7234 60.5743 4.89844 43.7646C6.27799 41.052 7.75611 38.4599 9.32422 36C20.3284 53.262 35.7763 64 52.8828 64C69.9892 64 85.4363 53.2618 96.4404 36Z" fill="white"/>
      <path d="M53 16C56.3837 16 59.5704 16.8419 62.3643 18.3252C62.104 18.2996 61.8402 18.2861 61.5732 18.2861C57.155 18.2861 53.5732 21.8679 53.5732 26.2861C53.5733 30.7044 57.155 34.2861 61.5732 34.2861C65.9914 34.286 69.5732 30.7043 69.5732 26.2861C69.5732 25.6761 69.5014 25.0827 69.3721 24.5117C71.6574 27.7626 73 31.7243 73 36C73 47.0457 64.0457 56 53 56C41.9543 56 33 47.0457 33 36C33 24.9543 41.9543 16 53 16Z" fill="white"/>

  </div>
  <div>
    <div class="header-title">Ovra</div>
    <div class="header-sub" id="headerSub">Настройка рабочей доски</div>
  </div>
</div>

<!-- ── Spinner (initial load) ── -->
<div id="loadingSpinner" class="spinner"></div>

<!-- ── Error screen ── -->
<div id="errorScreen" class="msg err hidden"></div>

<!-- ── Home / profile (no tenant: opened from the bot's menu button) ── -->
<div id="homeScreen" class="hidden">
  <div class="profile-card">
    <div class="avatar" id="homeAvatar">?</div>
    <div>
      <div class="profile-name" id="homeName">—</div>
      <div class="profile-user" id="homeUsername"></div>
    </div>
  </div>
  <div class="section" style="margin-top:20px;">
    <div class="section-title">Мои доски</div>
    <div id="homeBoardList" class="project-list"></div>
  </div>
</div>

<!-- ── Main content ── -->
<div id="mainContent" class="hidden">

  <!-- Back to "my boards" -->
  <div id="backRow" class="back-row" onclick="goHome()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Мои доски</span>
  </div>

  <!-- Profile -->
  <div class="profile-card">
    <div class="avatar" id="avatarEl">?</div>
    <div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-user" id="profileUsername"></div>
      <div id="profileBadge"></div>
    </div>
  </div>

  <!-- Workspace info row -->
  <div class="section" id="wsInfoSection">
    <div class="section-title">Воркспейс</div>
    <div class="info-row">
      <span class="info-label">Название</span>
      <span class="info-value" id="wsName">—</span>
    </div>
    <div class="info-row" id="wsStatusRow">
      <span class="info-label">Статус подключения</span>
      <span id="wsStatusBadge"></span>
    </div>
  </div>

  <!-- ── Connect form (shown when not connected) ── -->
  <div id="connectSection" class="hidden">
    <div class="section" style="margin-top:20px;">
      <div class="section-title">Подключить YouGile</div>
      <div class="tabs">
        <button class="tab-btn active" id="tabApiKey" onclick="switchTab('apikey')">API Ключ</button>
        <button class="tab-btn"        id="tabLogin"  onclick="switchTab('login')">Логин + Пароль</button>
      </div>

      <!-- API Key tab -->
      <div id="panelApiKey" class="form-block">
        <div class="field">
          <label>API ключ YouGile</label>
          <input type="text" id="inputApiKey" placeholder="Вставьте ключ из YouGile" autocomplete="off" />
        </div>
        <button class="btn-primary" id="btnConnectKey" onclick="connectViaApiKey()">Подключить</button>
      </div>

      <!-- Login+Password tab -->
      <div id="panelLogin" class="form-block hidden">
        <div class="field">
          <label>Логин (email)</label>
          <input type="email" id="inputLogin" placeholder="user@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="field">
          <label>ID компании <span style="font-weight:400;text-transform:none;">(необязательно)</span></label>
          <input type="text" id="inputCompanyId" placeholder="Оставьте пустым — покажем список" autocomplete="off" />
        </div>
        <button class="btn-primary" id="btnConnectLogin" onclick="connectViaLogin()">Продолжить</button>
        <!-- Company picker (shown when the account belongs to several companies) -->
        <div id="companyPicker" class="hidden" style="margin-top:14px;">
          <div class="section-title" style="padding:0 0 8px;">Выберите компанию</div>
          <div id="companyList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Not admin / member view ── -->
  <div id="notAdminSection" class="hidden">
    <!-- populated dynamically by renderMemberView() -->
  </div>

  <!-- ── Project selection (shown when connected but no project) ── -->
  <div id="projectSection" class="hidden">
    <div class="section" style="margin-top:20px;">
      <div class="section-title">Выберите проект YouGile</div>
      <div id="projectList" class="project-list"></div>
    </div>
  </div>

  <!-- ── Dashboard (board connected + resolved) ── -->
  <div id="dashboardSection" class="hidden">

    <!-- Board settings card -->
    <div class="section" style="margin-top:20px;">
      <div class="section-title">Доска YouGile</div>
      <div class="info-row">
        <span class="info-label">Статус</span>
        <span id="dashStatus"></span>
      </div>
      <!-- Project name (admin only, loaded async) -->
      <div id="dashProjectRow" class="info-row hidden">
        <span class="info-label">Проект</span>
        <span class="info-value" id="dashProjectName" style="max-width:60%;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;">—</span>
      </div>
      <!-- Digest toggle (admin only) -->
      <div id="dashDigestRow" class="info-row hidden">
        <span class="info-label">Дайджест задач</span>
        <label class="toggle">
          <input type="checkbox" id="digestToggle" onchange="onDigestToggle()">
          <span class="track"></span>
        </label>
      </div>
      <div id="dashDigestTimeRow" class="info-row hidden">
        <span class="info-label">Время отправки</span>
        <input type="time" id="digestTimeInput" class="time-input" onchange="onDigestTimeChange()">
      </div>
    </div>

    <!-- Admin action buttons -->
    <div class="section hidden" id="dashAdminActions">
      <button class="btn-secondary" onclick="showChangeProject()">Сменить проект YouGile</button>
      <button class="btn-secondary" onclick="showReconnect()">Переподключить YouGile</button>
    </div>

    <!-- Role management (admin only) -->
    <div class="section hidden" id="dashRolesSection">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-title" style="margin-bottom:0;">Управление ролями</div>
        <button class="btn-refresh" onclick="loadUserRoles()" title="Обновить">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
      </div>
      <div id="userRolesList"></div>
    </div>

    <!-- Tasks by member -->
    <div class="section" style="margin-top:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-title" style="margin-bottom:0;">Участники и задачи</div>
        <button class="btn-refresh" onclick="refreshDashboard()" title="Обновить">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
      </div>
      <div id="memberTasksList"></div>
    </div>

  </div><!-- /dashboardSection -->

</div><!-- /mainContent -->

<!-- ── Bind YouGile user bottom sheet ── -->
<div class="sheet-backdrop" id="bindBackdrop" onclick="closeBindSheet()"></div>
<div class="edit-sheet" id="bindSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Привязать к YouGile</span>
    <button class="sheet-close" onclick="closeBindSheet()">✕</button>
  </div>
  <div class="sheet-body" id="bindSheetBody"></div>
</div>

<!-- ── Edit-task bottom sheet ── -->
<div class="sheet-backdrop" id="editBackdrop" onclick="closeEditSheet()"></div>
<div class="edit-sheet" id="editSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Редактировать задачу</span>
    <button class="sheet-close" onclick="closeEditSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <input type="hidden" id="editTaskId" />
    <div class="sheet-field">
      <label>Название</label>
      <input type="text" id="editTitle" placeholder="Название задачи" />
    </div>
    <div class="sheet-field">
      <label>Описание</label>
      <textarea id="editDesc" placeholder="Описание (необязательно)"></textarea>
    </div>
    <div class="sheet-field">
      <label>Статус</label>
      <select id="editStatus">
        <option value="in_progress">В работе</option>
        <option value="todo">В очереди</option>
        <option value="review">На ревью</option>
        <option value="done">Готово</option>
      </select>
    </div>
    <div class="sheet-field">
      <label>Исполнитель</label>
      <select id="editAssignee">
        <option value="">Не назначен</option>
      </select>
    </div>
    <div class="sheet-field">
      <label>Дедлайн</label>
      <input type="date" id="editDeadline" />
    </div>
    <button class="sheet-save" id="editSaveBtn" onclick="saveTask()">Сохранить</button>
  </div>
</div>

<script>
'use strict';

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── Helpers ──────────────────────────────────────────────────────────────────

function el(id) { return document.getElementById(id); }

// Render an avatar: profile photo from Telegram if available, otherwise the
// first letter of the name. Falls back to the letter if the image fails to load.
function setAvatar(id, photoUrl, letter) {
  const node = el(id);
  if (!node) return;
  const initial = (letter || '?').toUpperCase();
  if (photoUrl) {
    const img = new Image();
    img.alt = initial;
    img.onerror = () => { node.textContent = initial; };
    img.src = photoUrl;
    node.textContent = '';
    node.appendChild(img);
  } else {
    node.textContent = initial;
  }
}

function show(id) { el(id).classList.remove('hidden'); }
function hide(id) { el(id).classList.add('hidden');    }

function setError(msg) {
  hide('loadingSpinner');
  hide('mainContent');
  const e = el('errorScreen');
  e.textContent = msg;
  e.classList.remove('hidden');
}

function apiBase() {
  return window.location.origin;
}

async function api(path, body) {
  const res = await fetch(apiBase() + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.error || 'Ошибка сервера'), { status: res.status, data });
  return data;
}

// ── State ────────────────────────────────────────────────────────────────────

const params   = new URLSearchParams(window.location.search);
const tenantId = params.get('tenant') || tg.initDataUnsafe?.start_param || '';
const initData = tg.initData || '';

let state = {}; // { user, workspace, isAdmin }

// ── Init ─────────────────────────────────────────────────────────────────────

(async function init() {
  if (!initData) {
    setError('Нет данных Telegram. Откройте мини-апп через Telegram.');
    return;
  }

  // No tenant in the URL → opened from the menu button: show profile + boards.
  if (!tenantId) {
    initHome();
    return;
  }

  try {
    const result = await api('/miniapp/verify', { init_data: initData, tenant_id: tenantId });
    state = result;
    renderMain();
  } catch (e) {
    setError('Ошибка авторизации: ' + (e.message || 'неизвестная ошибка'));
  }
})();

// ── Home / profile (no tenant) ─────────────────────────────────────────────────

async function initHome() {
  try {
    const result = await api('/miniapp/workspaces', { init_data: initData });
    hide('loadingSpinner');

    const user = result.user || {};
    const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
    el('homeName').textContent = fullName || 'Пользователь';
    if (user.username) el('homeUsername').textContent = '@' + user.username;
    setAvatar('homeAvatar', user.photo_url, fullName[0]);
    el('headerSub').textContent = 'Профиль';

    const listEl = el('homeBoardList');
    const workspaces = result.workspaces || [];
    if (workspaces.length === 0) {
      listEl.innerHTML = '<div class="msg">У вас пока нет досок.<br>Добавьте бота в рабочую группу — он подскажет, как подключить доску YouGile.</div>';
    } else {
      listEl.innerHTML = '';
      workspaces.forEach(ws => {
        const name = ws.name || ws.tenant_id;
        const initial = escHtml((name.trim()[0] || '#').toUpperCase());

        const item = document.createElement('div');
        item.className = 'project-item';
        item.innerHTML =
          '<div class="board-icon">' + initial + '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="project-name">' + escHtml(name) + '</div>' +
            '<div style="margin-top:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
              roleBadge(ws.is_admin) + statusBadge(ws.connected, ws.board_resolved) +
            '</div>' +
          '</div>';
        item.onclick = () => openWorkspace(ws.tenant_id);
        listEl.appendChild(item);
      });
    }
    show('homeScreen');
  } catch (e) {
    setError('Ошибка загрузки профиля: ' + (e.message || 'неизвестная ошибка'));
  }
}

// Re-open the mini-app scoped to one workspace (reloads into the board flow).
function openWorkspace(tid) {
  const u = new URL(window.location.href);
  u.searchParams.set('tenant', tid);
  window.location.href = u.toString();
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderMain() {
  hide('loadingSpinner');

  const { user, workspace } = state;
  // NOTE: backend sends "is_admin" (snake_case) — must read via state.is_admin, not destructuring.
  const isAdmin = state.is_admin === true;

  // Profile
  const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
  el('profileName').textContent = fullName || 'Пользователь';
  if (user.username) el('profileUsername').textContent = '@' + user.username;
  setAvatar('avatarEl', user.photo_url, fullName[0]);
  el('profileBadge').innerHTML = roleBadge(state.role || isAdmin);

  // Header subtitle
  el('headerSub').textContent = isAdmin ? 'Настройка рабочей доски' : 'Информация о доске';

  // Workspace
  el('wsName').textContent = workspace.name || workspace.tenant_id;
  el('wsStatusBadge').innerHTML = statusBadge(workspace.connected, workspace.board_resolved);

  show('mainContent');

  if (isAdmin) {
    // ── Admin flow ────────────────────────────────────────────────────────────
    if (workspace.connected && workspace.board_resolved) {
      loadDashboard();
    } else if (workspace.connected && !workspace.board_resolved) {
      loadProjects();
    } else {
      show('connectSection');
    }
  } else {
    // ── Member flow ───────────────────────────────────────────────────────────
    if (workspace.connected && workspace.board_resolved) {
      loadDashboard();
    } else {
      renderMemberView(workspace);
    }
  }
}

// renderMemberView shows a context-appropriate read-only view for non-admin users.
function renderMemberView(workspace) {
  const section = el('notAdminSection');
  let content;

  if (workspace.connected && workspace.board_resolved) {
    content =
      '<div class="info-row" style="margin-top:10px;">' +
        '<span class="info-label">Статус YouGile</span>' +
        '<span>' + statusBadge(true, true) + '</span>' +
      '</div>' +
      '<div class="msg" style="color:var(--text);margin-top:10px;">' +
        'Доска YouGile подключена и готова к работе.' +
        '<br><span style="font-size:12px;color:var(--hint);margin-top:4px;display:block;">' +
        'Чтобы привязать свой аккаунт YouGile, используйте команду <b>/start</b> в боте.' +
        '</span>' +
      '</div>';
  } else if (workspace.connected && !workspace.board_resolved) {
    content =
      '<div class="msg" style="color:var(--text);margin-top:10px;">' +
        'Доска подключается — администратор выбирает проект YouGile.' +
        '<br><span style="font-size:12px;color:var(--hint);margin-top:4px;display:block;">' +
        'Вернитесь чуть позже, всё заработает автоматически.' +
        '</span>' +
      '</div>';
  } else {
    content =
      '<div class="msg" style="margin-top:10px;">' +
        'Доска ещё не подключена к YouGile.' +
        '<br><span style="font-size:12px;margin-top:4px;display:block;">' +
        'Попросите создателя группы открыть мини-апп и подключить доску.' +
        '</span>' +
      '</div>';
  }

  section.innerHTML = content;
  show('notAdminSection');
}

// ── Tab switching ────────────────────────────────────────────────────────────

function switchTab(tab) {
  if (tab === 'apikey') {
    el('tabApiKey').classList.add('active');
    el('tabLogin').classList.remove('active');
    show('panelApiKey');
    hide('panelLogin');
  } else {
    el('tabLogin').classList.add('active');
    el('tabApiKey').classList.remove('active');
    show('panelLogin');
    hide('panelApiKey');
  }
}

// ── Connect via API Key ───────────────────────────────────────────────────────

async function connectViaApiKey() {
  const apiKey = el('inputApiKey').value.trim();
  if (!apiKey) { tg.showAlert('Введите API ключ'); return; }

  const btn = el('btnConnectKey');
  btn.disabled = true;
  btn.textContent = 'Подключаю…';

  try {
    await api('/miniapp/connect', {
      init_data: initData,
      tenant_id: tenantId,
      api_key:   apiKey,
    });
    state.workspace.connected = true;
    hide('connectSection');
    loadProjects();
  } catch (e) {
    tg.showAlert('Ошибка: ' + (e.message || 'неизвестная ошибка'));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Подключить';
  }
}

// ── Connect via Login + Password ─────────────────────────────────────────────

async function connectViaLogin() {
  const login     = el('inputLogin').value.trim();
  const password  = el('inputPassword').value;
  const companyId = el('inputCompanyId').value.trim();

  if (!login)    { tg.showAlert('Введите логин'); return; }
  if (!password) { tg.showAlert('Введите пароль'); return; }

  const btn = el('btnConnectLogin');
  btn.disabled = true;
  btn.textContent = 'Проверяю…';

  try {
    // Manual company ID → connect straight away.
    if (companyId) {
      await doConnectLogin(login, password, companyId);
      return;
    }
    // Otherwise fetch the account's companies and decide.
    const res = await api('/miniapp/companies', { init_data: initData, tenant_id: tenantId, login, password });
    const companies = res.companies || [];
    if (companies.length === 0) {
      tg.showAlert('У этого аккаунта нет компаний в YouGile.');
    } else if (companies.length === 1) {
      await doConnectLogin(login, password, companies[0].id);
    } else {
      renderCompanyPicker(companies, login, password);
    }
  } catch (e) {
    tg.showAlert('Ошибка: ' + (e.message || 'неизвестная ошибка'));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Продолжить';
  }
}

// Render the list of companies for the user to pick (multiple-company accounts).
function renderCompanyPicker(companies, login, password) {
  const listEl = el('companyList');
  listEl.innerHTML = '';
  companies.forEach(c => {
    const item = document.createElement('div');
    item.className = 'project-item';
    item.innerHTML =
      '<div class="board-icon">' + escHtml(((c.name || '?').trim()[0] || '#').toUpperCase()) + '</div>' +
      '<span class="project-name">' + escHtml(c.name || c.id) + '</span>';
    item.onclick = () => doConnectLogin(login, password, c.id);
    listEl.appendChild(item);
  });
  show('companyPicker');
}

// Obtain the key for a specific company and continue to project selection.
async function doConnectLogin(login, password, companyId) {
  const btn = el('btnConnectLogin');
  btn.disabled = true;
  btn.textContent = 'Подключаю…';
  try {
    await api('/miniapp/connect', {
      init_data:  initData,
      tenant_id:  tenantId,
      login:      login,
      password:   password,
      company_id: companyId,
    });
    state.workspace.connected = true;
    hide('connectSection');
    hide('companyPicker');
    loadProjects();
  } catch (e) {
    tg.showAlert('Ошибка: ' + (e.message || 'неизвестная ошибка'));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Продолжить';
  }
}

// ── Project selection ─────────────────────────────────────────────────────────

async function loadProjects() {
  show('projectSection');
  const listEl = el('projectList');
  listEl.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(apiBase() + `/v1/workspaces/${tenantId}/yougile-projects`);
    const data = await res.json();
    const projects = data.projects || [];

    if (projects.length === 0) {
      listEl.innerHTML = '<div class="msg">В YouGile нет проектов. Создайте проект и обновите страницу.</div>';
      return;
    }

    listEl.innerHTML = '';
    projects.forEach(p => {
      const item = document.createElement('div');
      item.className = 'project-item';
      item.innerHTML = `<div class="project-icon"></div><span class="project-name">${escHtml(p.title || p.id)}</span>`;
      item.onclick = () => selectProject(p.id, p.title);
      listEl.appendChild(item);
    });
  } catch (e) {
    listEl.innerHTML = `<div class="msg err">Ошибка загрузки проектов: ${escHtml(e.message)}</div>`;
  }
}

async function selectProject(projectId, projectTitle) {
  const listEl = el('projectList');
  listEl.innerHTML = '<div class="spinner"></div>';

  try {
    // 1. Привязываем проект
    const r1 = await fetch(apiBase() + `/v1/workspaces/${tenantId}/project`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: projectId }),
    });
    if (!r1.ok) throw new Error('Не удалось привязать проект');

    // 2. Распознаём колонки доски
    const r2 = await fetch(apiBase() + `/v1/workspaces/${tenantId}/board/resolve`, { method: 'POST' });
    if (!r2.ok) throw new Error('Не удалось распознать колонки');

    state.workspace.board_resolved = true;
    hide('projectSection');
    loadDashboard();
    tg.MainButton.hide();
  } catch (e) {
    listEl.innerHTML = `<div class="msg err">Ошибка: ${escHtml(e.message)}</div>`;
  }
}

// ── Utility ──────────────────────────────────────────────────────────────────

// roleBadge / statusBadge — corporate UI helpers (no emoji): a role tag and a
// colored-dot connection status, reused by the home list and the board view.
function roleBadge(roleOrBool) {
  if (roleOrBool === true || roleOrBool === 'admin')     return '<span class="role admin">Администратор</span>';
  if (roleOrBool === 'moderator')                        return '<span class="role moderator">Модератор</span>';
  return '<span class="role member">Участник</span>';
}

function statusBadge(connected, resolved) {
  let cls = 'err', label = 'Не подключено';
  if (connected && resolved) { cls = 'ok';   label = 'Подключено'; }
  else if (connected)        { cls = 'warn'; label = 'Настройка проекта'; }
  return '<span class="status ' + cls + '"><span class="dot"></span>' + label + '</span>';
}

// ── Dashboard (connected + board resolved) ───────────────────────────────────

async function loadDashboard() {
  const { workspace } = state;
  const isAdmin = state.is_admin === true;

  el('dashStatus').innerHTML = statusBadge(true, true);

  if (isAdmin) {
    show('dashProjectRow');
    show('dashDigestRow');
    show('dashAdminActions');
    show('dashRolesSection');
    loadUserRoles();
  }

  show('dashboardSection');

  const listEl = el('memberTasksList');
  listEl.innerHTML = '<div class="spinner" style="margin:16px auto;"></div>';

  try {
    // Parallel: digest (tasks + settings) + project list (admin only for name lookup).
    const digestPromise  = fetch(apiBase() + `/v1/workspaces/${tenantId}/digest`);
    const projectPromise = isAdmin
      ? fetch(apiBase() + `/v1/workspaces/${tenantId}/yougile-projects`)
      : Promise.resolve(null);

    const [digestRes, projectsRes] = await Promise.all([digestPromise, projectPromise]);
    if (!digestRes.ok) throw new Error(`digest HTTP ${digestRes.status}`);

    const digestData = await digestRes.json();

    // Digest settings (admin)
    if (isAdmin) {
      el('digestToggle').checked = !!digestData.digest_enabled;
      el('digestTimeInput').value = digestData.digest_time || '09:00';
      if (digestData.digest_enabled) show('dashDigestTimeRow');

      // Project name lookup
      if (projectsRes && projectsRes.ok) {
        const pd = await projectsRes.json();
        const match = (pd.projects || []).find(p => p.id === workspace.yougile_project_id);
        el('dashProjectName').textContent = match
          ? (match.title || match.id)
          : (workspace.yougile_project_id
              ? workspace.yougile_project_id.slice(0, 12) + '…'
              : '—');
      }
    }

    renderMemberTasks(digestData);
  } catch (e) {
    listEl.innerHTML = `<div class="msg err">Ошибка загрузки: ${escHtml(e.message)}</div>`;
  }
}

async function refreshDashboard() {
  const listEl = el('memberTasksList');
  listEl.innerHTML = '<div class="spinner" style="margin:16px auto;"></div>';
  try {
    const res = await fetch(apiBase() + `/v1/workspaces/${tenantId}/digest`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    renderMemberTasks(await res.json());
  } catch (e) {
    listEl.innerHTML = `<div class="msg err">Ошибка обновления: ${escHtml(e.message)}</div>`;
  }
}

// Renders collapsible per-member task cards.
function renderMemberTasks(data) {
  const listEl = el('memberTasksList');
  listEl.innerHTML = '';

  const STATUS_COLOR = { todo: '#3b82f6', in_progress: '#f59e0b', review: '#8b5cf6', done: '#22c55e' };
  const STATUS_LABEL = { todo: 'В очереди', in_progress: 'В работе', review: 'На ревью', done: 'Готово' };

  // Build groups: named assignees + optional "unassigned" bucket.
  const groups = [...(data.assignees || [])];
  if ((data.unassigned || []).length) {
    groups.push({ full_name: 'Без исполнителя', tg_username: '', tasks: data.unassigned });
  }

  const nonEmpty = groups.filter(g => g.tasks && g.tasks.length > 0);

  if (nonEmpty.length === 0) {
    listEl.innerHTML = '<div class="msg" style="color:var(--text);">Нет открытых задач — всё в порядке!</div>';
    return;
  }

  nonEmpty.forEach((group, idx) => {
    const initials = group.full_name.trim().split(/\s+/).map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || '?';
    const isOpen = idx === 0;
    const n = group.tasks.length;

    const editable = canEditTasks();
    const tasksHtml = group.tasks.map(t => {
      const color = STATUS_COLOR[t.status] || 'var(--hint)';
      const label = STATUS_LABEL[t.status] || t.status;
      const dl = t.deadline
        ? new Date(t.deadline).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' })
        : '';
      const dlMeta = dl ? (t.overdue ? `<span class="task-overdue">${dl} · Просрочено</span>` : dl) : '';
      const clickAttr = editable ? `onclick="openEditSheet('${escHtml(t.id)}')"` : '';
      const chevron = editable
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--hint);margin-left:6px;"><polyline points="9 18 15 12 9 6"/></svg>'
        : '';
      return `<div class="task-item" ${clickAttr} style="${editable ? '' : 'cursor:default;'}">
        <div style="flex:1;min-width:0;">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta" style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="display:inline-flex;align-items:center;gap:4px;background:${color}22;color:${color};border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600;">${escHtml(label)}</span>
            ${dlMeta ? `<span style="font-size:11px;color:var(--hint);">${dlMeta}</span>` : ''}
          </div>
        </div>
        ${chevron}
      </div>`;
    }).join('');

    const countLabel = `${n} ${pluralRu(n, 'задача', 'задачи', 'задач')}`;

    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML =
      `<div class="member-header" onclick="toggleMember(this)">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="board-icon" style="width:34px;height:34px;font-size:13px;">${escHtml(initials)}</div>
          <div>
            <div class="member-name">${escHtml(group.full_name)}</div>
            ${group.tg_username ? `<div style="font-size:11px;color:var(--hint);">${escHtml(group.tg_username)}</div>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--hint);">${escHtml(countLabel)}</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
      <div class="member-tasks${isOpen ? '' : ' collapsed'}">${tasksHtml}</div>`;

    listEl.appendChild(card);
  });
}

// Expand/collapse a member card.
function toggleMember(header) {
  const tasksEl = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const nowCollapsed = tasksEl.classList.toggle('collapsed');
  chevron.style.transform = nowCollapsed ? 'rotate(0deg)' : 'rotate(180deg)';
}

// Digest toggle: save immediately.
async function onDigestToggle() {
  const enabled = el('digestToggle').checked;
  const time    = el('digestTimeInput').value || '09:00';
  if (enabled) { show('dashDigestTimeRow'); } else { hide('dashDigestTimeRow'); }
  try {
    await fetch(apiBase() + `/v1/workspaces/${tenantId}/digest`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled, time }),
    });
  } catch (e) { tg.showAlert('Не удалось сохранить настройки дайджеста'); }
}

// Digest time input: save on change.
async function onDigestTimeChange() {
  const enabled = el('digestToggle').checked;
  const time    = el('digestTimeInput').value;
  if (!time) return;
  try {
    await fetch(apiBase() + `/v1/workspaces/${tenantId}/digest`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled, time }),
    });
  } catch (e) { tg.showAlert('Не удалось сохранить время'); }
}

// Admin: go back to project selection.
function showChangeProject() {
  hide('dashboardSection');
  loadProjects();
}

// Admin: go back to connection form.
function showReconnect() {
  hide('dashboardSection');
  hide('companyPicker');
  show('connectSection');
}

// Russian plural helper.
function pluralRu(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

// goHome — return from a board view to the profile / "my boards" screen.
function goHome() {
  const u = new URL(window.location.href);
  u.searchParams.delete('tenant');
  window.location.href = u.toString();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Task edit sheet ───────────────────────────────────────────────────────────

let _editOrig = null; // task snapshot at open-time for change detection

// Returns true if the current user can edit tasks (admin or moderator).
function canEditTasks() {
  return state.is_admin === true || state.role === 'admin' || state.role === 'moderator';
}

function openEditSheet(taskId) {
  if (!canEditTasks()) return;
  el('editTaskId').value = taskId;
  el('editTitle').value = '';
  el('editDesc').value = '';
  el('editStatus').value = 'todo';
  el('editAssignee').innerHTML = '<option value="">Загрузка…</option>';
  el('editDeadline').value = '';
  el('editSaveBtn').disabled = true;
  _editOrig = null;

  el('editSheet').classList.add('open');
  el('editBackdrop').classList.add('open');

  Promise.all([
    fetch(apiBase() + `/v1/tasks/${encodeURIComponent(taskId)}`).then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(d))),
    fetch(apiBase() + `/v1/workspaces/${encodeURIComponent(tenantId)}/users`).then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(d))),
  ]).then(([task, usersData]) => {
    _editOrig = task;
    el('editTitle').value = task.title || '';
    el('editDesc').value  = task.description || '';
    el('editStatus').value = task.status || 'todo';
    if (task.deadline) el('editDeadline').value = task.deadline.substring(0, 10);

    const sel = el('editAssignee');
    sel.innerHTML = '<option value="">Не назначен</option>';
    (usersData.users || []).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.full_name + (u.tg_username ? ` (${u.tg_username})` : '');
      if (u.id === task.assignee_user_id) opt.selected = true;
      sel.appendChild(opt);
    });

    el('editSaveBtn').disabled = false;
  }).catch(e => {
    closeEditSheet();
    tg.showAlert('Не удалось загрузить задачу: ' + (e.error || e.message || 'попробуйте ещё раз'));
  });
}

function closeEditSheet() {
  el('editSheet').classList.remove('open');
  el('editBackdrop').classList.remove('open');
  _editOrig = null;
}

async function saveTask() {
  const taskId = el('editTaskId').value;
  const btn    = el('editSaveBtn');
  btn.disabled = true;

  const title = el('editTitle').value.trim();
  if (!title) {
    tg.showAlert('Название не может быть пустым.');
    btn.disabled = false;
    return;
  }

  const orig = _editOrig || {};
  const patch = {};

  if (title !== (orig.title || ''))                               patch.title = title;
  const desc = el('editDesc').value.trim();
  if (desc !== (orig.description || ''))                          patch.description = desc;
  const status = el('editStatus').value;
  if (status !== (orig.status || ''))                             patch.status = status;
  const assigneeId = el('editAssignee').value;
  if (assigneeId !== (orig.assignee_user_id || ''))               patch.assignee_user_id = assigneeId;
  const dlVal  = el('editDeadline').value;
  const origDl = orig.deadline ? orig.deadline.substring(0, 10) : '';
  if (dlVal !== origDl)                                           patch.deadline = dlVal;

  if (Object.keys(patch).length === 0) { closeEditSheet(); return; }

  try {
    const res = await fetch(apiBase() + '/miniapp/update-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData, tenant_id: tenantId, task_id: taskId, ...patch }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || `HTTP ${res.status}`);
    }
    closeEditSheet();
    refreshDashboard();
  } catch (e) {
    tg.showAlert('Ошибка при сохранении: ' + (e.message || 'попробуйте ещё раз'));
    btn.disabled = false;
  }
}

// ── Role management (admin only) ──────────────────────────────────────────────

async function loadUserRoles() {
  const listEl = el('userRolesList');
  listEl.innerHTML = '<div class="spinner" style="margin:12px auto;"></div>';
  try {
    const [usersRes, ygRes] = await Promise.all([
      fetch(apiBase() + `/v1/workspaces/${encodeURIComponent(tenantId)}/users`),
      fetch(apiBase() + `/v1/workspaces/${encodeURIComponent(tenantId)}/yougile-users`),
    ]);
    if (!usersRes.ok) throw new Error(`users HTTP ${usersRes.status}`);
    const usersData = await usersRes.json();
    const ygData = ygRes.ok ? await ygRes.json() : { users: [] };
    renderUserRoles(usersData.users || [], ygData.users || []);
  } catch (e) {
    listEl.innerHTML = `<div class="msg err" style="margin-top:0;">Ошибка загрузки: ${escHtml(e.message)}</div>`;
  }
}

function renderUserRoles(users, ygUsers) {
  const listEl = el('userRolesList');
  const hostTgId = String((state.workspace || {}).host_tg_id || '');
  const realUsers = users.filter(u => !u.tg_id.startsWith('yg:'));
  if (realUsers.length === 0) {
    listEl.innerHTML = '<div class="msg" style="color:var(--hint);margin-top:0;">Нет зарегистрированных участников.</div>';
    return;
  }
  // Build a quick id→name map for YouGile users.
  const ygMap = {};
  (ygUsers || []).forEach(y => { ygMap[y.id] = y.name || y.id; });

  listEl.innerHTML = '';
  realUsers.forEach(u => {
    const initials = (u.full_name || '?').trim().split(/\s+/).map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || '?';
    const isHost = u.tg_id === hostTgId;
    const roleControl = isHost
      ? '<span class="role admin" style="white-space:nowrap;font-size:10px;">Администратор</span>'
      : `<select class="role-select" onchange="setUserRoleFromApp('${escHtml(u.tg_id)}', this.value)">` +
          `<option value="member"${u.role === 'member' ? ' selected' : ''}>Участник</option>` +
          `<option value="moderator"${u.role === 'moderator' ? ' selected' : ''}>Модератор</option>` +
          `<option value="admin"${u.role === 'admin' ? ' selected' : ''}>Администратор</option>` +
        `</select>`;

    const ygName = u.yougile_user_id ? (ygMap[u.yougile_user_id] || '…') : null;
    const bindingRow =
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px 10px;border-top:1px solid rgba(0,0,0,.05);">' +
        '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--hint);">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>' +
          (ygName
            ? '<span style="color:var(--text);font-weight:500;">' + escHtml(ygName) + '</span>'
            : '<span>Не привязан к YouGile</span>') +
        '</div>' +
        `<button onclick="openBindSheet('${escHtml(u.tg_id)}')" style="background:none;border:none;color:var(--link);font-size:12px;font-weight:600;cursor:pointer;padding:2px 0;">` +
          (ygName ? 'Изменить' : 'Привязать') +
        '</button>' +
      '</div>';

    const card = document.createElement('div');
    card.className = 'member-card';
    card.style.marginBottom = '8px';
    card.innerHTML =
      '<div style="padding:12px 14px 10px;display:flex;align-items:center;gap:12px;">' +
        '<div class="board-icon" style="width:36px;height:36px;font-size:13px;">' + escHtml(initials) + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="member-name">' + escHtml(u.full_name || '—') + '</div>' +
          (u.tg_username ? '<div style="font-size:11px;color:var(--hint);">' + escHtml(u.tg_username) + '</div>' : '') +
        '</div>' +
        roleControl +
      '</div>' +
      bindingRow;
    listEl.appendChild(card);
  });
}

// ── YouGile binding sheet ─────────────────────────────────────────────────────

let _bindTgId = null;

function openBindSheet(tgId) {
  _bindTgId = tgId;
  const body = el('bindSheetBody');
  body.innerHTML = '<div class="spinner" style="margin:16px auto;"></div>';
  el('bindSheet').classList.add('open');
  el('bindBackdrop').classList.add('open');

  fetch(apiBase() + `/v1/workspaces/${encodeURIComponent(tenantId)}/yougile-users`)
    .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
    .then(data => renderYougilePickerList(data.users || []))
    .catch(e => {
      body.innerHTML = `<div class="msg err">${escHtml(e.message)}</div>`;
    });
}

function closeBindSheet() {
  el('bindSheet').classList.remove('open');
  el('bindBackdrop').classList.remove('open');
  _bindTgId = null;
}

function renderYougilePickerList(ygUsers) {
  const body = el('bindSheetBody');
  body.innerHTML = '';

  // Unbind option
  const unbind = document.createElement('div');
  unbind.className = 'project-item';
  unbind.style.marginBottom = '6px';
  unbind.innerHTML = '<span style="font-size:14px;color:var(--hint);">✕ &nbsp;Убрать привязку</span>';
  unbind.onclick = () => doBindUser(_bindTgId, '');
  body.appendChild(unbind);

  if (ygUsers.length === 0) {
    body.innerHTML += '<div class="msg" style="margin-top:0;color:var(--hint);">Нет участников YouGile.</div>';
    return;
  }

  ygUsers.forEach(u => {
    const initial = ((u.name || '?').trim()[0] || '?').toUpperCase();
    const item = document.createElement('div');
    item.className = 'project-item';
    item.style.marginBottom = '6px';
    item.innerHTML =
      '<div class="board-icon" style="width:34px;height:34px;font-size:13px;">' + escHtml(initial) + '</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div class="project-name">' + escHtml(u.name || u.id) + '</div>' +
        (u.email ? '<div style="font-size:11px;color:var(--hint);margin-top:2px;">' + escHtml(u.email) + '</div>' : '') +
      '</div>';
    item.onclick = () => doBindUser(_bindTgId, u.id);
    body.appendChild(item);
  });
}

async function doBindUser(tgId, yougileUserId) {
  closeBindSheet();
  try {
    const res = await fetch(apiBase() + '/miniapp/bind-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData, tenant_id: tenantId, tg_id: tgId, yougile_user_id: yougileUserId }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || `HTTP ${res.status}`);
    }
    loadUserRoles();
  } catch (e) {
    tg.showAlert('Не удалось обновить привязку: ' + (e.message || 'ошибка'));
  }
}

async function setUserRoleFromApp(tgId, role) {
  try {
    const res = await fetch(apiBase() + '/miniapp/set-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData, tenant_id: tenantId, tg_id: tgId, role }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || `HTTP ${res.status}`);
    }
  } catch (e) {
    tg.showAlert('Не удалось обновить роль: ' + (e.message || 'ошибка'));
    loadUserRoles();
  }
}
