// Minimal SpeechKit v3 proto required for RecognizeStreaming.
// Field numbers, package name and types match the official Yandex Cloud API:
// https://github.com/yandex-cloud/cloudapi/blob/master/yandex/cloud/ai/stt/v3/stt_service.proto
// IMPORTANT: the gRPC package the Yandex Envoy router expects is
// `speechkit.stt.v3` (NOT `yandex.cloud.ai.stt.v3`). Using the wrong package
// yields NR / UNIMPLEMENTED. The response field numbers must match exactly or
// protobuf parsing fails with "invalid wire type".

syntax = "proto3";

package speechkit.stt.v3;

service Recognizer {
  rpc RecognizeStreaming (stream StreamingRequest) returns (stream StreamingResponse);
}

// ---------------------------------------------------------------------------
// Request messages

message StreamingRequest {
  oneof Event {
    StreamingOptions session_options = 1;
    AudioChunk chunk = 2;
  }
}

message StreamingOptions {
  RecognitionModelOptions recognition_model = 1;
  TextNormalizationOptions text_normalization = 4;
}

message RecognitionModelOptions {
  string model = 1;
  AudioFormatOptions audio_format = 2;
  repeated LanguageRestrictionOptions language_restriction = 4;
}

message AudioFormatOptions {
  oneof AudioFormat {
    RawAudio raw_audio = 1;
  }
}

message RawAudio {
  enum AudioEncoding {
    AUDIO_ENCODING_UNSPECIFIED = 0;
    LINEAR16_PCM = 1;
  }
  AudioEncoding audio_encoding = 1;
  int64 sample_rate_hertz = 2;
  int64 audio_channel_count = 3;
}

message LanguageRestrictionOptions {
  enum LanguageRestrictionType {
    LANGUAGE_RESTRICTION_TYPE_UNSPECIFIED = 0;
    WHITELIST = 1;
    BLACKLIST = 2;
  }
  LanguageRestrictionType restriction_type = 1;
  repeated string language_code = 2;
}

message TextNormalizationOptions {
  enum TextNormalization {
    TEXT_NORMALIZATION_UNSPECIFIED = 0;
    TEXT_NORMALIZATION_ENABLED = 1;
    TEXT_NORMALIZATION_DISABLED = 2;
  }
  TextNormalization text_normalization = 1;
}

message AudioChunk {
  bytes data = 1;
}

// ---------------------------------------------------------------------------
// Response messages — field numbers MUST match the server wire format.

message SessionUuid {
  string uuid = 1;
  string user_request_id = 2;
}

message AudioCursors {
  int64 received_data_ms = 1;
  int64 reset_time_ms = 2;
  int64 partial_time_ms = 3;
  int64 final_time_ms = 4;
  int64 final_index = 5;
  int64 eou_time_ms = 6;
}

message Word {
  string text = 1;
  int64 start_time_ms = 2;
  int64 end_time_ms = 3;
}

message LanguageEstimation {
  string language_code = 1;
  double probability = 2;
}

message Alternative {
  repeated Word words = 1;
  string text = 2;
  int64 start_time_ms = 3;
  int64 end_time_ms = 4;
  double confidence = 5;
  repeated LanguageEstimation languages = 6;
}

message AlternativeUpdate {
  repeated Alternative alternatives = 1;
  string channel_tag = 2;
}

message EouUpdate {
  int64 time_ms = 1;
}

message FinalRefinement {
  int64 final_index = 1;
  AlternativeUpdate normalized_text = 2;
}

message StatusCode {
  enum CodeType {
    CODE_TYPE_UNSPECIFIED = 0;
    WORKING = 1;
    WARNING = 2;
    CLOSED = 3;
  }
  CodeType code_type = 1;
  string message = 2;
}

message StreamingResponse {
  SessionUuid session_uuid = 1;
  AudioCursors audio_cursors = 2;
  int64 response_wall_time_ms = 3;

  oneof Event {
    AlternativeUpdate partial = 4;
    AlternativeUpdate final = 5;
    EouUpdate eou_update = 6;
    FinalRefinement final_refinement = 7;
    StatusCode status_code = 8;
  }

  string channel_tag = 9;
}
