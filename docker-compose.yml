services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ovra
      POSTGRES_PASSWORD: ovra
      POSTGRES_DB: ovra
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovra -d ovra"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://ovra:ovra@postgres:5432/ovra?sslmode=disable"
      WORKSPACE_CONFIG: "/app/workspace.yaml"
      YOUGILE_API_TOKEN: "${YOUGILE_API_TOKEN:-}"
      APP_SECRET: "${APP_SECRET:-dev-only-change-me}"
      BOT_SECRET: "${BOT_SECRET:-}"
      # Optional AI column classifier — set OPENROUTER_API_KEY to enable.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openai/gpt-4o-mini}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      DEDUP_SIMILARITY: "${DEDUP_SIMILARITY:-0.4}"
      # Таймзона для дедлайнов со временем без TZ (напр. «к 18:00»).
      DEADLINE_TZ: "${DEADLINE_TZ:-Europe/Moscow}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Интеграция с meeting-worker и ботом
      MEETING_WORKER_URL: "http://meeting-worker:3001"
      BOT_INTERNAL_URL: "http://bot:3000"
      # Telegram Mini App — bot token для верификации initData; URL мини-аппа
      # (публичный HTTPS) для кнопок в боте. Требует HTTPS в продакшене.
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      MINI_APP_URL: "${MINI_APP_URL:-}"
    ports:
      - "8080:8080"
    volumes:
      - ./workspace.yaml:/app/workspace.yaml:ro

  meeting-worker:
    build: ./meeting-worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./meeting-worker/.env
    environment:
      # Та же БД, но СВОЯ схема `meeting` — чтобы Prisma-миграции воркера не
      # конфликтовали с таблицами Go-бэкенда в схеме public (ошибка P3005).
      DATABASE_URL: "postgresql://ovra:ovra@postgres:5432/ovra?schema=meeting"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-qwen/qwen3.5-35b-a3b}"
      ORCH_POLL_MS: "${ORCH_POLL_MS:-15000}"
      ORCH_JOIN_LEAD_MS: "${ORCH_JOIN_LEAD_MS:-60000}"
      ORCH_MAX_CALLS: "${ORCH_MAX_CALLS:-3}"
      ORCH_HEARTBEAT_TIMEOUT_MS: "${ORCH_HEARTBEAT_TIMEOUT_MS:-45000}"
      ORCH_MAX_ATTEMPTS: "${ORCH_MAX_ATTEMPTS:-2}"
      WORKER_HEARTBEAT_MS: "${WORKER_HEARTBEAT_MS:-15000}"
      WORKER_MAX_CALL_MS: "${WORKER_MAX_CALL_MS:-10800000}"
      WORKER_SILENCE_MS: "${WORKER_SILENCE_MS:-300000}"
      AUDIO_SAMPLE_RATE: "${AUDIO_SAMPLE_RATE:-16000}"
      AUDIO_CHANNELS: "${AUDIO_CHANNELS:-1}"
      GOOGLE_SA_JSON: "${GOOGLE_SA_JSON:-}"
      GOOGLE_CALENDAR_IDS: "${GOOGLE_CALENDAR_IDS:-}"
      YANDEX_CALDAV_USERNAME: "${YANDEX_CALDAV_USERNAME:-}"
      YANDEX_CALDAV_PASSWORD: "${YANDEX_CALDAV_PASSWORD:-}"
      CALENDAR_POLL_MS: "${CALENDAR_POLL_MS:-300000}"
      CALENDAR_LOOKAHEAD_MS: "${CALENDAR_LOOKAHEAD_MS:-7200000}"
      YANDEX_API_KEY: "${YANDEX_API_KEY:-}"
      YANDEX_FOLDER_ID: "${YANDEX_FOLDER_ID:-}"
      YANDEX_STT_ENDPOINT: "${YANDEX_STT_ENDPOINT:-stt.api.cloud.yandex.net:443}"
      YANDEX_STT_LANG: "${YANDEX_STT_LANG:-ru-RU}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      BACKEND_URL: "http://app:8080"
    volumes:
      # JSON-файлы саммари встреч — общая папка чтобы Go-разработчик мог читать
      - meeting_output:/app/output
    # Без этого после OOM (Exit 137) контейнер молча оставался лежать.
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:8080
    depends_on:
      - app
    restart: unless-stopped

  bot:
    build: ./ovra_bot
    depends_on:
      - app
    # Секреты бота (TELEGRAM_BOT_TOKEN, OPENROUTER_API_KEY, TENANT_ID, ...) берутся
    # из собственного .env бота. Файл должен существовать (см. ovra_bot/.env).
    env_file:
      - ./ovra_bot/.env
    environment:
      # Перекрываем сетевое значение: внутри compose-сети бэкенд — по имени сервиса,
      # а не localhost (это значение важнее того, что лежит в .env бота).
      BACKEND_URL: "http://app:8080"
      DEADLINE_TZ: "${DEADLINE_TZ:-Europe/Moscow}"
      MINI_APP_URL: "${MINI_APP_URL:-}"
      BOT_SECRET: "${BOT_SECRET:-}"
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

volumes:
  pgdata:
  meeting_output:
  bot_data: